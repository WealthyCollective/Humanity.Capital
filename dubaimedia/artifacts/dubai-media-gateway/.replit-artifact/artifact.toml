kind = "web"
previewPath = "/"
title = "Dubai Media Gateway"
version = "1.0.0"
id = "artifacts/dubai-media-gateway"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21203

[services.development]
run = "pnpm --filter @workspace/dubai-media-gateway run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dubai-media-gateway", "run", "build" ]
serve = "static"
publicDir = "artifacts/dubai-media-gateway/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21203"
BASE_PATH = "/"
